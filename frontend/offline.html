<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#1e804f"/>
  <link rel="manifest" href="/manifest.webmanifest"/>
  <link rel="icon" href="/assets/icons/icon.svg" type="image/svg+xml"/>
  <title>Hors ligne - FasoOrientation</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: Arial, sans-serif; background: #f6f8f7; color: #17231c; }
    main { width: min(520px, calc(100vw - 32px)); background: #fff; border: 1px solid #dfe8e2; border-radius: 16px; padding: 28px; box-shadow: 0 16px 48px rgba(15, 23, 42, .08); }
    .mark { width: 48px; height: 48px; border-radius: 14px; background: #1e804f; display: grid; place-items: center; color: #fff; font-weight: 800; margin-bottom: 18px; }
    h1 { margin: 0 0 10px; font-size: 24px; }
    p { margin: 0 0 18px; line-height: 1.55; color: #526057; }
    a, button { display: inline-flex; border: 0; background: #1e804f; color: #fff; text-decoration: none; border-radius: 10px; padding: 11px 16px; font-weight: 700; cursor: pointer; }
    @media (prefers-color-scheme: dark) {
      body { background: #131f19; color: #eef7f1; }
      main { background: #17251e; border-color: #294134; }
      p { color: #b7c7bd; }
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">FO</div>
    <h1>Mode hors ligne</h1>
    <p>FasoOrientation est installee et les pages deja mises en cache restent accessibles. Les fonctions qui demandent Internet, comme l'IA, la connexion Supabase ou la verification en ligne, reprendront quand le reseau sera disponible.</p>
    <button onclick="location.reload()">Reessayer</button>
  </main>
</body>
</html>
